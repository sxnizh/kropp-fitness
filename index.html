<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KROPP</title>
    <link rel="stylesheet" href="./styles.css">
</head>
<body>
    <header class="header">
        <a href="/" class="header__logo">
        <img class="header__logo-image"
        src="./images/header-logo.png" 
        alt="Kropp Logo"
        width="135"
        height="25"
        loading="lazy">
        </a>

        <nav class="header__menu">
            <ul class="header__menu-list">
                <li class="header__menu-item"><a href="#" class="header__menu-link is-current">Home</a></li>
                <li class="header__menu-item"><a href="#" class="header__menu-link">Pages</a></li>
                <li class="header__menu-item"><a href="#" class="header__menu-link">Portfolio</a></li>
                <li class="header__menu-item"><a href="#" class="header__menu-link">Blog</a></li>
                <li class="header__menu-item"><a href="#" class="header__menu-link">Shop</a></li>
            </ul>
        </nav>

        <div class="header__actions">
            <button type="button" class="header__book-button button">Book now</button>
            <button type="button" class="header__burger-menu" title="Open menu">
                <span class="header__burger-menu-line"></span>
                <span class="header__burger-menu-line"></span>
                <span class="header__burger-menu-line"></span>
            </button>
        </div>
    </header>
</body>
</html>
